<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Nutricional UNAQ</title>
    <!-- Librería para exportar a imagen -->
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; /* Slate 900 */
            --primary-light: #1e293b; /* Slate 800 */
            --accent: #10b981; /* Emerald 500 */
            --accent-hover: #059669;
            --secondary: #475569; /* Slate 600 */
            --bg: #f8fafc; /* Slate 50 */
            --card-bg: #ffffff;
            --border: #e2e8f0; /* Slate 200 */
            --text: #0f172a; /* Slate 900 */
            --text-muted: #64748b; /* Slate 500 */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            
            /* Colores Macros */
            --color-prot: #3b82f6; /* Blue 500 */
            --color-fat: #eab308; /* Yellow 500 */
            --color-carb: #14b8a6; /* Teal 500 */

            --radius-lg: 12px;
            --radius-md: 8px;
            --radius-sm: 6px;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            padding-bottom: 150px;
            line-height: 1.5;
        }

        /* Layout Principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        @media (min-width: 768px) {
            header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        h1 { 
            margin: 0; 
            font-size: 1.6rem; 
            color: var(--primary); 
            font-weight: 700;
            letter-spacing: -0.025em;
        }
        h1 span { 
            font-size: 0.65em; 
            color: var(--text-muted); 
            font-weight: 500; 
            display: block; 
            margin-top: 6px; 
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid transparent;
            padding: 10px 18px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn:hover { 
            transform: translateY(-1px); 
            box-shadow: var(--shadow-md); 
        }
        .btn:active { 
            transform: translateY(0); 
        }

        .btn-random { background: #d97706; } /* Orange 600 */
        .btn-random:hover { background: #b45309; }
        .btn-export { background: var(--accent); }
        .btn-export:hover { background: var(--accent-hover); }
        .btn-clear { background: var(--danger); }
        .btn-clear:hover { background: #dc2626; }
        .btn-add { background: #2563eb; } /* Blue 600 */
        .btn-add:hover { background: #1d4ed8; }
        .btn-reset-recipes { 
            background: transparent; 
            border: 1px solid var(--border);
            color: var(--text-muted);
            box-shadow: none;
        }
        .btn-reset-recipes:hover {
            background: #f1f5f9;
            color: var(--text);
            box-shadow: none;
        }
        
        /* Notificaciones */
        #notification-area {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
        }
        .toast {
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            margin-bottom: 10px;
            box-shadow: var(--shadow-lg);
            animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-width: 280px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Selector de Día en Celular */
        .mobile-day-selector {
            display: none;
            gap: 6px;
            margin-bottom: 20px;
            background: white;
            padding: 6px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            overflow-x: auto;
            scrollbar-width: none; /* Firefox */
        }
        .mobile-day-selector::-webkit-scrollbar {
            display: none; /* Safari & Chrome */
        }
        .mobile-day-btn {
            flex: 1;
            border: none;
            padding: 10px 14px;
            background: transparent;
            color: var(--text-muted);
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            min-width: 75px;
        }
        .mobile-day-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.25);
        }

        /* Estructura del Grid Semanal */
        .planner-wrapper {
            overflow-x: auto;
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 30px;
            position: relative;
        }

        .weekly-grid {
            display: grid;
            grid-template-columns: 90px repeat(7, minmax(180px, 1fr));
            gap: 10px;
            min-width: 1200px; 
        }

        /* Encabezados Sticky */
        .header-day {
            text-align: center;
            font-weight: 600;
            padding: 14px;
            background: #f1f5f9;
            color: var(--primary);
            border-radius: var(--radius-md);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            position: sticky;
            top: 0;
            z-index: 10;
            border: 1px solid var(--border);
        }
        
        .header-cat {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            background: var(--primary-light);
            color: white;
            border-radius: var(--radius-md);
            writing-mode: vertical-lr;
            transform: rotate(180deg);
            padding: 12px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .header-total {
            background: var(--primary);
            border: 1px solid var(--primary);
        }

        /* Celdas de Comida */
        .meal-slot {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: var(--radius-md);
            min-height: 140px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            transition: all 0.2s ease;
            position: relative;
        }

        .meal-slot:hover {
            border-color: #94a3b8;
            background: #f1f5f9;
        }

        .meal-slot.drag-over {
            border-color: var(--accent);
            background: #ecfdf5;
        }

        /* Celda de Totales */
        .total-slot {
            background: #f1f5f9;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            font-size: 0.8rem;
            gap: 8px;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stat-label { font-weight: 600; color: var(--text-muted); font-size: 0.75rem; }
        .stat-val { font-family: monospace; font-weight: 700; font-size: 0.85rem; color: var(--primary); }
        
        /* Barras de Progreso */
        .progress-track {
            height: 5px;
            background: #e2e8f0;
            border-radius: 9999px;
            overflow: hidden;
            width: 100%;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 9999px;
        }

        .fill-cal { background-color: var(--success); }
        .fill-prot { background-color: var(--color-prot); }
        .fill-fat { background-color: var(--color-fat); }
        .fill-carb { background-color: var(--color-carb); }

        .stat-status { 
            font-size: 0.7rem; 
            text-align: center; 
            margin-top: 1px; 
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Tarjeta de Receta dentro del slot */
        .recipe-card {
            background: white;
            border-left: 4px solid var(--accent);
            padding: 12px;
            font-size: 0.85rem;
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
            cursor: grab;
            margin-bottom: 8px;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-top: 1px solid var(--border);
            border-right: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        
        .recipe-card:active { cursor: grabbing; }
        .recipe-card:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-md); 
        }

        .recipe-card h4 { 
            margin: 0 0 6px 0; 
            font-size: 0.9rem; 
            color: var(--primary); 
            font-weight: 600;
            line-height: 1.3;
            pointer-events: none; 
        }
        .recipe-card .meta { 
            display: flex; 
            justify-content: space-between; 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            font-weight: 600; 
            pointer-events: none; 
        }
        .recipe-card .desc { 
            margin-top: 6px; 
            color: var(--text-muted); 
            font-size: 0.75rem; 
            line-height: 1.4; 
            pointer-events: none; 
        }

        /* Icono de imagen en la tarjeta pequeña */
        .has-img-indicator {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 10px;
            opacity: 0.7;
        }

        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            color: white;
            border: none;
            width: 20px;
            height: 20px;
            line-height: 18px;
            text-align: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .recipe-card:hover .delete-btn { opacity: 1; }

        /* Banco de Alimentos */
        .food-bank {
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }
        
        .bank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 18px;
            margin-bottom: 20px;
        }

        .bank-header h2 { 
            margin: 0; 
            font-size: 1.3rem; 
            font-weight: 700;
            color: var(--primary);
        }

        .bank-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .bank-column {
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        
        .bank-column h3 {
            text-align: center;
            border-bottom: 2px solid;
            padding-bottom: 8px;
            margin-top: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .draggable-source {
            margin-bottom: 10px;
            border: 1px solid var(--border);
        }

        /* Colores por Categoría */
        .cat-desayuno { border-left-color: #f59e0b; } .col-desayuno h3 { border-color: #f59e0b; }
        .cat-lunch { border-left-color: #3b82f6; } .col-lunch h3 { border-color: #3b82f6; }
        .cat-comida { border-left-color: #ea580c; } .col-comida h3 { border-color: #ea580c; }
        .cat-colacion { border-left-color: #a855f7; } .col-colacion h3 { border-color: #a855f7; }
        .cat-cena { border-left-color: #10b981; } .col-cena h3 { border-color: #10b981; }
        .cat-extra { border-left-color: #f43f5e; } .col-extra h3 { border-color: #f43f5e; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        /* Modales */
        .modal {
            background: white;
            padding: 24px;
            border-radius: var(--radius-lg);
            width: 95%;
            max-width: 480px;
            box-shadow: var(--shadow-lg);
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--border);
        }

        .modal h3 { 
            margin-top: 0; 
            color: var(--primary); 
            margin-bottom: 20px; 
            text-align: center;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
        }
        
        /* Imagen en Modal */
        .recipe-img-container {
            position: relative;
            width: 100%;
        }

        .recipe-img-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--radius-md);
            background: #f1f5f9;
            border: 1px solid var(--border);
        }

        /* Botón mini de eliminar foto */
        .btn-mini-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(15, 23, 42, 0.7);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            font-weight: bold;
        }
        .btn-mini-remove:hover {
            background: var(--danger);
        }
        
        /* Input File personalizado */
        .file-input-wrapper {
            margin-bottom: 5px;
            position: relative;
        }
        .file-input-wrapper input[type="file"] {
            width: 100%;
            padding: 12px;
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Formulario Receta */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input[type="text"], 
        .form-group input[type="number"], 
        .form-group textarea, 
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            background: #f8fafc;
            outline: none;
            transition: all 0.2s;
        }
        .form-group input:focus, 
        .form-group textarea:focus, 
        .form-group select:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }
        .form-group textarea { min-height: 80px; resize: vertical; }

        .macros-row { display: flex; gap: 10px; }
        .macros-row .form-group { flex: 1; }

        .modal-actions { 
            margin-top: 24px; 
            display: flex; 
            gap: 10px; 
            justify-content: flex-end; 
            border-top: 1px solid var(--border);
            padding-top: 18px;
        }

        /* Responsividad móvil */
        @media (max-width: 767px) {
            body {
                padding: 10px;
            }
            header {
                padding: 16px;
                margin-bottom: 16px;
            }
            .planner-wrapper {
                padding: 10px;
                margin-bottom: 20px;
            }
            .weekly-grid {
                grid-template-columns: 80px 1fr !important;
                min-width: 0 !important;
                gap: 8px !important;
            }
            .header-day {
                display: none !important;
            }
            .meal-slot {
                display: none !important;
                min-height: 120px !important;
                padding: 6px !important;
            }
            .total-slot {
                display: none !important;
                padding: 8px !important;
            }
            
            /* Mostrar solo el día activo en celular */
            .weekly-grid.active-day-0 [data-day="0"], .weekly-grid.active-day-0 #total-slot-0 { display: flex !important; }
            .weekly-grid.active-day-1 [data-day="1"], .weekly-grid.active-day-1 #total-slot-1 { display: flex !important; }
            .weekly-grid.active-day-2 [data-day="2"], .weekly-grid.active-day-2 #total-slot-2 { display: flex !important; }
            .weekly-grid.active-day-3 [data-day="3"], .weekly-grid.active-day-3 #total-slot-3 { display: flex !important; }
            .weekly-grid.active-day-4 [data-day="4"], .weekly-grid.active-day-4 #total-slot-4 { display: flex !important; }
            .weekly-grid.active-day-5 [data-day="5"], .weekly-grid.active-day-5 #total-slot-5 { display: flex !important; }
            .weekly-grid.active-day-6 [data-day="6"], .weekly-grid.active-day-6 #total-slot-6 { display: flex !important; }

            .header-cat {
                writing-mode: horizontal-tb !important;
                transform: none !important;
                padding: 8px 4px !important;
                font-size: 0.7rem !important;
                text-align: center;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .header-cat.header-total {
                font-size: 0.65rem !important;
            }
            .food-bank {
                padding: 16px;
            }
            .bank-header {
                flex-direction: column;
                gap: 12px;
                align-items: stretch;
                text-align: center;
            }
            .bank-categories {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div id="notification-area"></div>

<!-- Modal de Confirmación -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal" style="max-width: 400px; text-align: center;">
        <h3 id="confirm-title">Confirmar</h3>
        <p id="confirm-msg">¿Estás seguro?</p>
        <div class="modal-actions" style="justify-content: center;">
            <button class="btn" style="background:#95a5a6" onclick="closeConfirmModal()">Cancelar</button>
            <button class="btn btn-clear" id="modal-confirm-btn">Confirmar</button>
        </div>
    </div>
</div>

<!-- Modal de Receta (Ver/Editar) -->
<div id="recipe-modal" class="modal-overlay">
    <div class="modal">
        <h3 id="recipe-modal-title">Detalles de la Receta</h3>
        
        <div class="form-group" id="image-upload-container">
            <label>Foto del Platillo</label>
            
            <!-- Estado 1: Sin Imagen -->
            <div id="upload-controls">
                <div class="file-input-wrapper">
                    <input type="file" id="recipe-img-input" accept="image/*" onchange="handleImageUpload(this)">
                </div>
                <small style="color: #888;">La imagen se guardará automáticamente en el navegador.</small>
            </div>

            <!-- Estado 2: Con Imagen -->
            <div id="image-display" style="display:none;" class="recipe-img-container">
                <img id="recipe-img-preview" class="recipe-img-preview" alt="Foto Receta">
                <button class="btn-mini-remove" onclick="removeImage()" title="Eliminar foto">✕</button>
            </div>
        </div>

        <div class="form-group">
            <label>Nombre del Platillo</label>
            <input type="text" id="recipe-name">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <select id="recipe-cat">
                <option value="desayuno">Desayuno</option>
                <option value="lunch">Lunch</option>
                <option value="comida">Comida</option>
                <option value="colacion">Colación</option>
                <option value="cena">Cena</option>
                <option value="extra">Extra</option>
            </select>
        </div>

        <div class="macros-row">
            <div class="form-group">
                <label>Calorías</label>
                <input type="number" id="recipe-cal">
            </div>
            <div class="form-group">
                <label>Prot (g)</label>
                <input type="number" id="recipe-prot">
            </div>
        </div>
        <div class="macros-row">
            <div class="form-group">
                <label>Grasas (g)</label>
                <input type="number" id="recipe-fat">
            </div>
            <div class="form-group">
                <label>Carbs (g)</label>
                <input type="number" id="recipe-carbs">
            </div>
        </div>

        <div class="form-group">
            <label>Receta / Ingredientes / Notas</label>
            <textarea id="recipe-desc" placeholder="Escribe aquí los ingredientes y pasos..."></textarea>
        </div>

        <div class="modal-actions">
            <button class="btn btn-add" id="btn-add-to-plan" onclick="addRecipeToActiveDay()" style="display:none;">Añadir al Plan</button>
            <button class="btn" style="background:#95a5a6" onclick="closeRecipeModal()">Cancelar</button>
            <button class="btn btn-export" onclick="saveRecipeFromModal()">Guardar Cambios</button>
        </div>
    </div>
</div>

<div class="container">
    <header>

    // Cargar librería de recetas (LocalStorage o Default)
    function loadRecipesLibrary() {
        const savedLibrary = localStorage.getItem('unaqAllRecipes_v4');
        if(savedLibrary) {
            currentRecipes = JSON.parse(savedLibrary);
            
            // Forzar la actualización si la versión local es vieja y no tiene 'extra'
            // Opcional: podrías verificar la versión o simplemente fusionar
            if(!currentRecipes.extra) {
                currentRecipes.extra = initialRecipesData.extra;
            }
        } else {
            // Clon profundo para no referenciar la const original
            currentRecipes = JSON.parse(JSON.stringify(initialRecipesData));
        }
    }

    function saveRecipesLibrary() {
        // Manejo de errores de quota (Storage full)
        try {
            // Importante usar v4 para diferenciar versiones
            localStorage.setItem('unaqAllRecipes_v4', JSON.stringify(currentRecipes));
        } catch (e) {
            if (e.name === 'QuotaExceededError') {
                alert("¡Memoria llena! No se pudo guardar. Intenta borrar algunas recetas o usar imágenes más pequeñas.");
            } else {
                console.error("Error saving to localStorage", e);
            }
        }
    }

    function askResetRecipes() {
        showConfirmModal("Resetear Recetas", "¿Volver a las recetas originales? Perderás cambios en nombres/fotos de las recetas base.", () => {

            saveRecipesLibrary();
            buildBank();
            showNotification("Recetas restauradas");
        });

    // 1. Construir la Rejilla Semanal
    function buildGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = ''; 
        
        container.appendChild(createDiv('header-cat', 'Hora/Día'));

        days.forEach(day => {
            container.appendChild(createDiv('header-day', day));
        });

        categories.forEach(cat => {
            const catLabel = createDiv('header-cat', cat);
            container.appendChild(catLabel);

            days.forEach((day, index) => {
                const slot = document.createElement('div');
                slot.className = `meal-slot`;
                slot.dataset.day = index;
                slot.dataset.cat = cat;
                slot.id = `slot-${index}-${cat}`;
                
                slot.addEventListener('dragover', e => {
                    e.preventDefault();
                    slot.classList.add('drag-over');
                });
                slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
                slot.addEventListener('drop', handleDrop);

                container.appendChild(slot);
            });
        });

        // Fila de TOTALES
        const totalLabel = createDiv('header-cat header-total', 'TOTALES');
        container.appendChild(totalLabel);

        days.forEach((day, index) => {
            const totalSlot = document.createElement('div');
            totalSlot.className = 'total-slot';
            totalSlot.id = `total-slot-${index}`;
            totalSlot.innerHTML = '...';
            container.appendChild(totalSlot);
        });
    }

    // 2. Construir el Banco de Recetas
    function buildBank() {
        const container = document.getElementById('bank-container');
        container.innerHTML = ''; 
        
        for (const [cat, items] of Object.entries(currentRecipes)) {
            const col = document.createElement('div');
            col.className = `bank-column col-${cat}`;
            col.innerHTML = `<h3>${cat}</h3>`;

            if(items) {
                items.forEach((item) => {
                    const card = createRecipeCard(item, cat);
                    col.appendChild(card);
                });
            }

            container.appendChild(col);
        }
    }

    function createRecipeCard(item, cat) {
        const div = document.createElement('div');
        div.className = `draggable-source recipe-card cat-${cat}`;
        div.draggable = true;
        
        div.onclick = function() { openRecipeModal(div, item); };

        let imgIndicator = item.img ? '<span class="has-img-indicator">📷</span>' : '';

        div.innerHTML = `
            <h4>${item.name}</h4>
            ${imgIndicator}
            <div class="meta">
                <span>🔥 ${item.cal}</span>
                <span>💪 ${item.p}g</span>
            </div>
        `;
        
        div.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ ...item, cat }));
            div.style.opacity = '0.5';
        });

        div.addEventListener('dragend', () => {
            div.style.opacity = '1';
        });

        return div;
    }

    function createDiv(cls, text) {
        const d = document.createElement('div');
        d.className = cls;
        d.innerText = text;
        return d;
    }

    // --- INTERACCIÓN ---

    function handleDrop(e) {
        e.preventDefault();
        e.currentTarget.classList.remove('drag-over');
        const dataStr = e.dataTransfer.getData('text/plain');
        if (!dataStr) return;

        const data = JSON.parse(dataStr);
        const slotCat = e.currentTarget.dataset.cat;
        const target = e.currentTarget;

        if (data.cat !== slotCat) {
            showConfirmModal("Mezcla extraña", `Estás poniendo ${data.cat.toUpperCase()} en ${slotCat.toUpperCase()}. ¿Seguro?`, () => {
                addMealToSlot(target, data);
                saveState();
                showNotification("Receta agregada fuera de horario");
            });
        } else {
            addMealToSlot(target, data);
            saveState();
        }
    }

    function addMealToSlot(slot, data) {
        slot.innerHTML = ''; 

        const card = document.createElement('div');
        card.className = `recipe-card cat-${data.cat}`;
        card.onclick = function() { openRecipeModal(card, data); };

        let imgIndicator = data.img ? '<span class="has-img-indicator">📷</span>' : '';

        card.innerHTML = `
            <button class="delete-btn" onclick="removeMeal(this, event)">×</button>
            <h4>${data.name}</h4>
            ${imgIndicator}
            <div class="meta">
                <span>${data.cal} kcal</span>
                <span>P: ${data.p}g</span>
            </div>
            <div class="desc">${data.desc.substring(0,50)}${data.desc.length>50?'...':''}</div>
        `;
        
        card.dataset.json = JSON.stringify(data);
        slot.appendChild(card);
    }

    function removeMeal(btn, event) {
        event.stopPropagation();
        const slot = btn.parentElement.parentElement;
        btn.parentElement.remove();
        saveState();
        showNotification("Comida eliminada");
    }

    function askClearGrid() {
        showConfirmModal("Limpiar Semana", "¿Borrar todo el plan?", () => {
            document.querySelectorAll('.meal-slot').forEach(slot => slot.innerHTML = '');
            saveState();
            showNotification("Semana reiniciada");
        });
    }

    function randomizeWeek() {
        let count = 0;
        
        // Iterar por categoría en lugar de por slot individualmente
        categories.forEach(cat => {
            const availableRecipes = currentRecipes[cat];
            if (!availableRecipes || availableRecipes.length === 0) return;

            // Obtener slots vacíos para esta categoría
            const slots = [];
            for(let i=0; i<7; i++) {
                const slot = document.getElementById(`slot-${i}-${cat}`);
                if (slot && slot.children.length === 0) {
                    slots.push(slot);
                }
            }

            if (slots.length === 0) return;

            // Lógica de selección
            let selectedRecipes = [];

            // Si hay suficientes recetas para cubrir la semana sin repetir (y no es 'extra')
            if (cat !== 'extra' && availableRecipes.length >= 7) {
                // Estrategia: Barajar y tomar los necesarios
                let pool = [...availableRecipes];
                
                // Algoritmo Fisher-Yates para barajar
                for (let i = pool.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pool[i], pool[j]] = [pool[j], pool[i]];
                }
                
                // Tomar los necesarios para los slots vacíos
                selectedRecipes = pool.slice(0, slots.length);

            } else {
                // Estrategia: "Smart Shuffle" (Barajar mazo, usar todo, rebarajar si falta)
                // Esto minimiza repeticiones incluso en listas cortas
                let needed = slots.length;
                let pool = [];
                
                while (selectedRecipes.length < needed) {
                    if (pool.length === 0) {
                        // Rellenar pool y barajar
                        pool = [...availableRecipes];
                        for (let i = pool.length - 1; i > 0; i--) {
                            const j = Math.floor(Math.random() * (i + 1));
                            [pool[i], pool[j]] = [pool[j], pool[i]];
                        }
                    }
                    selectedRecipes.push(pool.pop());
                }
            }

            // Asignar a los slots
            slots.forEach((slot, index) => {
                if (selectedRecipes[index]) {
                    addMealToSlot(slot, { ...selectedRecipes[index], cat: cat });
                    count++;
                }
            });
        });

        saveState();
        if(count > 0) showNotification(`${count} comidas generadas sin repetir (donde posible)`);
        else showNotification("La semana ya estaba llena.");
    }

    // --- MODAL DE RECETAS ---

    let currentEditingElement = null;
    let isCreatingNew = false;
    let originalDataId = null;
    let currentBase64Img = ""; // Variable para guardar la imagen codificada

    function buildMobileDaySelector() {
        const selector = document.getElementById('mobile-day-selector');
        if (!selector) return;
        selector.innerHTML = '';
        days.forEach((day, index) => {
            const btn = document.createElement('button');
            btn.className = `mobile-day-btn ${index === activeDayMobile ? 'active' : ''}`;
            btn.innerText = day.substring(0, 3); // "Lun", "Mar", etc.
            btn.onclick = () => {
                activeDayMobile = index;
                document.querySelectorAll('.mobile-day-btn').forEach((b, idx) => {
                    b.classList.toggle('active', idx === index);
                });
                updateMobileGridClass();
            };
            selector.appendChild(btn);
        });
        updateMobileGridClass();
    }

    function updateMobileGridClass() {
        const grid = document.getElementById('grid-container');
        if (!grid) return;
        for (let i = 0; i < 7; i++) {
            grid.classList.remove(`active-day-${i}`);
        }
        grid.classList.add(`active-day-${activeDayMobile}`);
    }

    function addRecipeToActiveDay() {
        const cat = document.getElementById('recipe-cat').value;
        const day = activeDayMobile;
        const slot = document.getElementById(`slot-${day}-${cat}`);
        if (slot) {
            const data = {
                id: originalDataId,
                name: document.getElementById('recipe-name').value || "Sin Nombre",
                cat: cat,
                cal: parseInt(document.getElementById('recipe-cal').value) || 0,
                p: parseInt(document.getElementById('recipe-prot').value) || 0,
                g: parseInt(document.getElementById('recipe-fat').value) || 0,
                c: parseInt(document.getElementById('recipe-carbs').value) || 0,
                desc: document.getElementById('recipe-desc').value || "",
                img: currentBase64Img

            addMealToSlot(slot, data);
            saveState();
            showNotification(`Receta añadida al ${days[day]} (${cat})`);
            closeRecipeModal();
        }

    function openRecipeModal(element, dataObj) {
        currentEditingElement = element;
        isCreatingNew = false;
        
        let data = dataObj;
        if (!data && element.dataset.json) {
            data = JSON.parse(element.dataset.json);
        }

        if(!data) return;
        originalDataId = data.id; 

        fillModal(data);
        
        const openedFromSlot = !!(element && element.closest && element.closest('.meal-slot'));
        const btnAddToPlan = document.getElementById('btn-add-to-plan');
        if (btnAddToPlan) {
            btnAddToPlan.style.display = openedFromSlot ? 'none' : 'block';
        }

        document.getElementById('recipe-modal-title').innerText = isCreatingNew ? "Crear Nueva Receta" : "Editar / Ver Receta";
        recipeModal.classList.add('active');
    }

    function openNewRecipeModal() {
        isCreatingNew = true;
        currentEditingElement = null;
        originalDataId = 'custom_' + Date.now();
        
        fillModal({
            id: originalDataId,
            name: "",
            cat: "comida",
            cal: 0, p: 0, g: 0, c: 0,
            desc: "",
            img: ""
        });
        document.getElementById('recipe-modal-title').innerText = "Crear Nueva Receta";
        recipeModal.classList.add('active');
    }

    // Manejador de subida de imágenes - OPTIMIZADO PARA AHORRAR ESPACIO
    function handleImageUpload(input) {
        const file = input.files[0];
        if (!file) return;

        showNotification("Comprimiendo imagen...");

        const reader = new FileReader();
        reader.onload = function(e) {
            // Comprimir imagen usando canvas antes de guardar
            const img = new Image();
            img.src = e.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // REDUCIR TAMAÑO PARA QUE QUEPAN MÁS IMÁGENES (500px máx)
                const MAX_WIDTH = 500;
                const MAX_HEIGHT = 500;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                } else {
                    if (height > MAX_HEIGHT) {
                        width *= MAX_HEIGHT / height;
                        height = MAX_HEIGHT;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                ctx.drawImage(img, 0, 0, width, height);

                // Obtener base64 comprimido (JPEG calidad 0.6)
                currentBase64Img = canvas.toDataURL('image/jpeg', 0.6); 
                
                // Mostrar preview Y OCULTAR INPUT
                updateImageUI(true);
                showNotification("Imagen lista");
            }
        };
        reader.readAsDataURL(file);
    }
    
    // Función para limpiar la imagen
    function removeImage() {
        currentBase64Img = "";
        document.getElementById('recipe-img-input').value = ""; // Reset input
        updateImageUI(false);
    }
    
    // Alternar entre modo "Subir" y modo "Ver/Borrar"
    function updateImageUI(hasImage) {
        const uploadControls = document.getElementById('upload-controls');
        const imageDisplay = document.getElementById('image-display');
        const imgPrev = document.getElementById('recipe-img-preview');
        
        if(hasImage && currentBase64Img) {
            imgPrev.src = currentBase64Img;
            uploadControls.style.display = 'none';
            imageDisplay.style.display = 'block';
        } else {
            imgPrev.src = "";
            uploadControls.style.display = 'block';
            imageDisplay.style.display = 'none';
        }
    }

    function fillModal(data) {
        document.getElementById('recipe-name').value = data.name || "";
        document.getElementById('recipe-cat').value = data.cat || "comida";
        document.getElementById('recipe-cal').value = data.cal || 0;
        document.getElementById('recipe-prot').value = data.p || 0;
        document.getElementById('recipe-fat').value = data.g || 0;
        document.getElementById('recipe-carbs').value = data.c || 0;
        document.getElementById('recipe-desc').value = data.desc || "";
        
        // Reset file input
        document.getElementById('recipe-img-input').value = "";

        // Set image state
        currentBase64Img = data.img || "";
        updateImageUI(!!currentBase64Img);
    }

    function saveRecipeFromModal() {
        const newData = {
            id: originalDataId,
            name: document.getElementById('recipe-name').value || "Sin Nombre",
            cat: document.getElementById('recipe-cat').value,
            cal: parseInt(document.getElementById('recipe-cal').value) || 0,
            p: parseInt(document.getElementById('recipe-prot').value) || 0,
            g: parseInt(document.getElementById('recipe-fat').value) || 0,
            c: parseInt(document.getElementById('recipe-carbs').value) || 0,
            desc: document.getElementById('recipe-desc').value || "",
            img: currentBase64Img // Usamos la variable global donde se guardó la imagen procesada
        };

        // --- LÓGICA DE PERSISTENCIA ---
        
        let found = false;
        
        for (const catKey of Object.keys(currentRecipes)) {
            const idx = currentRecipes[catKey].findIndex(r => r.id === newData.id);
            if (idx !== -1) {
                if (catKey !== newData.cat) {
                    currentRecipes[catKey].splice(idx, 1);
                    if(!currentRecipes[newData.cat]) currentRecipes[newData.cat] = [];
                    currentRecipes[newData.cat].push(newData);
                } else {
                    currentRecipes[catKey][idx] = newData;
                }
                found = true;
                break;
            }
        }

        if (!found) {
             if(!currentRecipes[newData.cat]) currentRecipes[newData.cat] = [];
             currentRecipes[newData.cat].push(newData);
        }

        saveRecipesLibrary();
        buildBank();

        if(!isCreatingNew && currentEditingElement) {
             currentEditingElement.dataset.json = JSON.stringify(newData);
             if(currentEditingElement.closest('.meal-slot')) {
                 addMealToSlot(currentEditingElement.parentElement, newData);
                 saveState();
             }
        }
        
        showNotification("Guardado permanentemente.");
        closeRecipeModal();
    }

    function closeRecipeModal() {
        recipeModal.classList.remove('active');
    }

    // --- CÁLCULO DE TOTALES ---
    function updateSummaries() {
        for(let i=0; i<7; i++) {
            let totalCal = 0;
            let totalP = 0;
            let totalG = 0;
            let totalC = 0;

            const daySlots = document.querySelectorAll(`.meal-slot[data-day="${i}"]`);
            daySlots.forEach(slot => {
                const card = slot.querySelector('.recipe-card');
                if(card && card.dataset.json) {
                    const data = JSON.parse(card.dataset.json);
                    totalCal += (data.cal || 0);
                    totalP += (data.p || 0);
                    totalG += (data.g || 0);
                    totalC += (data.c || 0);
                }
            });

            renderDaySummary(i, totalCal, totalP, totalG, totalC);
        }
    }

    function renderDaySummary(dayIndex, cal, p, g, c) {
        const summarySlot = document.getElementById(`total-slot-${dayIndex}`);
        if(!summarySlot) return;

        let calColor = 'var(--primary)';
        let calStatus = 'Falta';
        if (cal >= GOALS.minCal && cal <= GOALS.maxCal) {
            calColor = 'var(--success)';
            calStatus = '¡Perfecto!';
        } else if (cal > GOALS.maxCal) {
            calColor = 'var(--danger)';
            calStatus = `Exceso`;
        }
        const pctCal = Math.min((cal / GOALS.maxCal) * 100, 100);

        const pctProt = Math.min((p / GOALS.maxProt) * 100, 100);
        let protStatus = '';
        if(p >= GOALS.minProt) protStatus = '✔';

        const pctFat = Math.min((g / GOALS.maxFat) * 100, 100);
        const pctCarb = Math.min((c / GOALS.targetCarbs) * 100, 100);

        summarySlot.innerHTML = `
            <div class="stat-block">
                <div class="stat-row">
                    <span class="stat-label">Kcal</span>
                    <span class="stat-val" style="color:${calColor}">${cal}</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill fill-cal" style="width: ${pctCal}%; background-color:${calColor}"></div>
                </div>
                <div class="stat-status">${calStatus}</div>
            </div>
            <div class="stat-block">
                <div class="stat-row">
                    <span class="stat-label">Prot ${protStatus}</span>
                    <span class="stat-val">${p}g</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill fill-prot" style="width: ${pctProt}%"></div>
                </div>
            </div>
            <div class="stat-block">
                <div class="stat-row">
                    <span class="stat-label">Grasa</span>
                    <span class="stat-val">${g}g</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill fill-fat" style="width: ${pctFat}%"></div>
                </div>
            </div>
            <div class="stat-block">
                <div class="stat-row">
                    <span class="stat-label">Carbs</span>
                    <span class="stat-val">${c}g</span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill fill-carb" style="width: ${pctCarb}%"></div>
                </div>
            </div>
        `;
    }

    // --- UI HELPERS ---
    
    function showNotification(msg) {
        const area = document.getElementById('notification-area');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        area.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // Confirm Modal Logic
    const confirmModal = document.getElementById('confirm-modal');
    const modalConfirmBtn = document.getElementById('modal-confirm-btn');
    let onConfirmAction = null;

    function showConfirmModal(title, msg, onConfirm) {
        document.getElementById('confirm-title').innerText = title;
        document.getElementById('confirm-msg').innerText = msg;
        onConfirmAction = onConfirm;
        confirmModal.classList.add('active');
    }

    function closeConfirmModal() {
        confirmModal.classList.remove('active');
        onConfirmAction = null;
    }

    modalConfirmBtn.addEventListener('click', () => {
        if (onConfirmAction) onConfirmAction();
        closeConfirmModal();
    });

    // --- PERSISTENCIA & EXPORTAR ---
    
    function saveState() {
        const gridState = [];
        document.querySelectorAll('.meal-slot').forEach(slot => {
            const card = slot.querySelector('.recipe-card');
            if (card) {
                gridState.push({
                    id: slot.id,
                    data: JSON.parse(card.dataset.json)
                });
            }
        });
        localStorage.setItem('unaqPlanState_v4', JSON.stringify(gridState));
        updateSummaries();
    }

    function loadState() {
        const saved = localStorage.getItem('unaqPlanState_v4');
        if (saved) {
            try {
                const gridState = JSON.parse(saved);
                gridState.forEach(item => {
                    const slot = document.getElementById(item.id);
                    if (slot) {
                        addMealToSlot(slot, item.data);
                    }
                });
            } catch(e) { console.error("Error loading state", e); }
        }
        updateSummaries();
    }

    function exportImage() {
        showNotification("Generando imagen...");
        const element = document.getElementById('capture-area');
        const originalOverflow = element.style.overflow;
        element.style.overflow = 'visible'; 
        
        html2canvas(element, {
            scale: 2, 
            backgroundColor: "#ffffff",
            useCORS: true,
            logging: false,
            windowWidth: element.scrollWidth,
            width: element.scrollWidth
        }).then(canvas => {
            element.style.overflow = originalOverflow;
            const link = document.createElement('a');
            link.download = `Plan_Semanal_UNAQ_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL();
            link.click();
            showNotification("¡Imagen descargada!");
        }).catch(err => {
            element.style.overflow = originalOverflow;
            showNotification("Error al generar imagen");
            console.error(err);
        });
    }

    // --- AUTO SCROLL AL ARRASTRAR ---
    let scrollInterval = null;
    const scrollSpeed = 15;
    const scrollZone = 50; // px from edge

    window.addEventListener('dragover', (e) => {
        // Detectar si estamos cerca de los bordes
        if (e.clientY < scrollZone) {
            startScrolling(-1); // Arriba
        } else if (e.clientY > window.innerHeight - scrollZone) {
            startScrolling(1); // Abajo
        } else {
            stopScrolling();
        }
    });

    window.addEventListener('dragend', stopScrolling);
    window.addEventListener('drop', stopScrolling);

    function startScrolling(direction) {
        if (scrollInterval) return; // Ya está scrolleando
        scrollInterval = setInterval(() => {
            window.scrollBy(0, direction * scrollSpeed);
        }, 16); // ~60fps
    }

    function stopScrolling() {
        if (scrollInterval) {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
    }
</script>
